name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        run: ./gradlew build

      - name: Get jar path
        id: jar
        run: |
          echo "path=$(find build/libs -name '*.jar' ! -name '*-plain.jar')" >> "$GITHUB_OUTPUT"

      - name: Upload jar to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ${{ steps.jar.outputs.path }}